spring:
  application:
    name: sd-upload
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    schemas: sd_upload
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL:localhost:5432/postgres?currentSchema=sd_upload}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    name: sd_upload
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgreSQLDialect
      connection.handling-mode: 'DELAYED_ACQUISITION_AND_HOLD'
      naming:
        implicit-strategy: 'org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy'
        physical-strategy: 'org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy'
    properties:
      hibernate:
        format-sql: false
        default_schema: sd_upload
        jdbc:
          time_zone: UTC
  main.banner-mode: off

server:
  port: 8080
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/sd-upload}
management:
  info:
    git:
      mode: full
  endpoints:
    web:
      exposure.include: health, prometheus, info
  tracing:
    propagation:
      consume: [ B3_MULTI, W3C, B3 ]
      produce: B3_MULTI
  prometheus:
    metrics:
      export:
        enabled: true

logback:
  log:
    dir: log

app:
  scheduling:
    max-concurrent-tasks: ${MAX_CONCURRENT_TASKS:20} # Maximum number of concurrent tasks that can be executed by the scheduler
    publish-event:
      enabled: ${PUBLISH_EVENT_ENABLED:true} # If true, the scheduler will be enabled and will try to re-process events
      attempt-frequency: ${PUBLISH_EVENT_ATTEMPT_FREQUENCY:1M} # How often we should try to re-send events in minutes. Gruel default - 2 minutes
      block-after-attempts: ${PUBLISH_EVENT_BLOCK_AFTER_ATTEMPTS:15} # After how many attempts we should stop re-sending events. Gruel default - 5 times
      flush-batch-size: ${PUBLISH_EVENT_FLUSH_BATCH_SIZE:4096} # How many events we should try to re-send in one batch. Gruel default - 4096
      fixed-delay: ${PUBLISH_EVENT_SCHEDULING_FIXED_DELAY:15m} # Delay between scheduler runs in minutes.
      error-notifications-enabled: ${PUBLISH_EVENT_ERROR_NOTIFICATIONS_ENABLED:true} # If true, the scheduler will send notifications to Slack in case of errors
      table-name: txno_outbox

security:
  access:
    documentation:
      username: ${SECURITY_ACCESS_DOCUMENTATION_USERNAME:documentation}
      password: ${SECURITY_ACCESS_DOCUMENTATION_PASSWORD:password}
    internal:
      username: scaledrop
      password: ${SECURITY_ACCESS_INTERNAL_PASSWORD:scaledrop}

aws:
  region: ${AWS_REGION:eu-north-1}
  s3:
    assume-role:
    fileserver:
      endpoint: ${AWS_S3_ENDPOINT:} # should stay blank end set as environment variable if needed
      region: ${AWS_S3_BUCKET_REGION:eu-north-1}
      bucket: ${AWS_S3_BUCKET_NAME:sd-fileserver}
  sns:
    endpoint: ${AWS_SNS_ENDPOINT:}
    file-updates-topic-arn: ${AWS_FILE_UPDATES_SNS_TOPIC_ARN:}

springdoc:
  use-fqn: true
  show-actuator: true
  api-docs:
    version: openapi_3_0
