app:
  db:
    schema: ${DB_SCHEMA:sd_iam}

spring:
  application:
    name: sd-iam
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    schemas: ${app.db.schema}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL:localhost:5432/postgres?currentSchema=sd_iam}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    name: ${app.db.schema}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgreSQLDialect
      connection.handling-mode: 'DELAYED_ACQUISITION_AND_HOLD'
      naming:
        implicit-strategy: 'org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy'
        physical-strategy: 'org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy'
    properties:
      hibernate:
        format-sql: false
        default_schema: ${app.db.schema}
        jdbc:
          time_zone: UTC
  main.banner-mode: off

server:
  port: 7300
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/sd-iam}
management:
  info:
    git:
      mode: full
  endpoints:
    web:
      exposure.include: health, prometheus, info
  tracing:
    propagation:
      consume: [ B3_MULTI, W3C, B3 ]
      produce: B3_MULTI
  prometheus:
    metrics:
      export:
        enabled: true

logback:
  log:
    dir: log

security:
  access:
    documentation:
      username: ${SECURITY_ACCESS_DOCUMENTATION_USERNAME:documentation}
      password: ${SECURITY_ACCESS_DOCUMENTATION_PASSWORD:password}
    internal:
      username: scaledrop
      password: ${SECURITY_ACCESS_INTERNAL_PASSWORD:scaledrop}

springdoc:
  use-fqn: true
  show-actuator: true
  api-docs:
    version: openapi_3_0
